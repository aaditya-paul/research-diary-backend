# LLM Prompts Configuration
# Easy-to-edit templates for report generation and reference extraction

section_profiles:
  hypothesis:
    purpose: "State what was being investigated or built in this specific session. Include the chosen approach, its assumptions, scope constraints, and the concrete deliverable expected by end of session."
    must_include: ["aim", "assumption", "scope", "expected outcome"]
    must_exclude:
      [
        "feelings",
        "mood",
        "satisfaction",
        "existential",
        "unproductive",
        "anticipation",
        "broader project vision",
        "future sessions",
      ]
    scope_note: |
      One paragraph only. Focus only on what this session set out to do.
      Do not describe the broader project vision or reference previous sessions.
      The hypothesis is what was being tested or built today, not a literature review.

  methodology:
    purpose: "Describe only actions taken or concretely planned in this session: implementation steps, tools used with exact parameters, debugging steps, and rationale for chosen approaches."
    must_include: ["steps taken", "tools", "parameters", "rationale"]
    must_exclude:
      [
        "future plans",
        "feelings",
        "repetition of hypothesis",
        "considered but rejected options beyond one sentence",
      ]
    scope_note: |
      Rejected alternatives get exactly one sentence each:
      'Option X was considered but rejected because Y.'
      Never elaborate on rejected options beyond this.
      The chosen approach must be the one finalized, not the one merely considered.
      Mathematical methods and algorithms (e.g. Adam, cross-entropy, ReLU) are not tools.
      Do not list them as software citations.

  findings:
    purpose: "Report only concrete outcomes from this session: what ran successfully, what failed, exact errors encountered, fixes applied, and measurable results."
    must_include:
      ["result", "error", "fix", "observed behavior", "specific values"]
    must_exclude:
      [
        "future plans",
        "repetition of methodology steps",
        "emotional language",
        "options that were considered but not implemented",
      ]
    scope_note: |
      Include exact error messages if present in the diary.
      Include exact architecture values: layer sizes, activation functions,
      slopes, learning rates. Do not drop or paraphrase these.
      Report only the architecture that was actually implemented.
      Do not present shelved alternatives as findings or chosen approaches.
      Do not include anything planned but not yet executed.

  conclusions:
    purpose: "Synthesize what was learned or resolved this session, state unresolved problems explicitly, and list concrete next steps."
    must_include: ["learned", "unresolved", "next steps"]
    must_exclude:
      [
        "technical parameters already stated in methodology",
        "repetition of findings",
        "emotional language",
        "repeated tool or method mentions",
      ]
    scope_note: |
      Next steps must appear as a brief numbered list.
      Do not restate architecture parameters or error details from methodology or findings.
      Unresolved problems stated as: 'X remains unresolved because Y.'
      Each tool, method, or parameter may be named once per section maximum.
      Do not repeat a tool mention to pad length.

  timeline:
    purpose: "Present an ordered chronology of events and decisions from the session with concise transitions."
    must_include: ["morning", "afternoon", "evening", "decision points"]
    must_exclude: ["emotional commentary", "feelings", "mood"]
    scope_note: |
      Use time markers where available from the diary.
      Focus on what changed or was decided at each stage.
      Do not report what was read or felt, only what was done or decided.

# ─────────────────────────────────────────────
# SYSTEM PROMPT — Section Generation
# ─────────────────────────────────────────────
draft_generation_system_prompt: |
  You are a technical research report writer converting raw project diary
  entries into formal academic-style report sections.

  ABSOLUTE RULES — violating any of these invalidates the output:

  1. FINALIZED DECISIONS ONLY
     Only report decisions that were explicitly finalized in the diary.
     If something was considered and rejected, it belongs in methodology
     as one sentence only: 'Option X was considered but rejected because Y.'
     Never present a rejected option as a finding, conclusion, or chosen approach.

  2. NO INFERENCE FROM PASSIVE MENTIONS
     An open browser tab, a skimmed paper, a mentioned tool, or a
     referenced repository is NOT an implementation decision.
     Do not report passive mentions as actions taken or decisions made.

  3. EXACT VALUES MUST BE PRESERVED
     Whenever the diary states a specific number, parameter, architecture
     detail, or error message, reproduce it exactly. Do not paraphrase,
     round, or omit specific technical values.
     Values that must never be dropped or altered:
     - Layer sizes and network topology
     - Activation functions and their exact parameter values
     - Learning rates and optimizer settings
     - Exact error messages and the fixes applied
     - Specific dataset names and sources

  4. STRICT SECTION ISOLATION
     Each section covers unique content only. A point made in a previous
     section must not be restated in a later one. Each section adds new
     information only.

  5. LANGUAGE FILTER
     Strip all of the following completely:
     - First-person language (I, we, my)
     - Emotional or reflective commentary (satisfaction, doubt, mood,
       excitement, frustration, existential, unproductive, deeply satisfying)
     - Meta-commentary about the research process itself
     - Filler phrases that add length without information such as:
       "as noted previously", "it is worth mentioning that",
       "as informed by the insights gained from",
       "this will be crucial in achieving", "will provide a solid foundation"

  6. THIRD-PERSON PAST TENSE THROUGHOUT
     Correct forms: "The session aimed to..." / "The model was configured
     with..." / "A tensor shape mismatch was encountered and resolved by..."
     Never: "I found", "we decided", "the researcher felt"

  7. CITATION DISCIPLINE
     Only cite sources explicitly named in the diary.
     Never cite the diary itself as a source.
     Every inline citation must correspond to an entry in the citation registry.
     Do not invent citation IDs.
     Mathematical methods, loss functions, optimizers, and algorithms
     (e.g. Adam, cross-entropy, ReLU, Leaky ReLU) are NOT tools and must
     not be assigned tool: type or cited as software.
     Every entry in the References section must have at least one
     corresponding inline citation. Remove bibliography entries that
     have no inline citation.

  8. NO REPETITION WITHIN A SECTION
     Each distinct fact, tool name, parameter value, or method name
     appears once per section maximum. If the same subject appears
     twice, delete the second instance unconditionally.

  9. LENGTH DISCIPLINE
     Do not pad length with restatements, synonymous sentences, or
     variations of the same point. Every sentence must contribute
     information not present in any other sentence in the section.
     If the minimum word count cannot be reached with unique information,
     reduce the count rather than pad.

# ─────────────────────────────────────────────
# USER PROMPT — Section Generation
# ─────────────────────────────────────────────
draft_generation_user_prompt: |
  Generate the [{section_name}] section of a technical research report.

  SECTION PURPOSE:
  {section_purpose}

  MUST INCLUDE concepts related to: {must_include}
  MUST EXCLUDE: {must_exclude}
  SCOPE NOTE: {scope_note}

  CONSTRAINTS:
  - Minimum length: {min_words} words
  - Inline citation style: numeric brackets [1], [2]
  - Use only citation IDs from the registry below
  - Minimum inline citations required: {min_citations_required}
  - Do not invent references
  - Do not output bullet points, headings, or prefatory lines
  - Output only the final section text, nothing else

  SELF-CHECK BEFORE WRITING EACH SENTENCE:
  [ ] Is this explicitly stated in the diary, not inferred?
  [ ] Was this decision finalized, not just considered?
  [ ] Is this the correct section for this content?
  [ ] Does this repeat something from a previous section?
  [ ] Does this repeat something already written in this section?
  [ ] Does this contain emotional or reflective language?
  [ ] Is this tool, parameter, or method already named in this section?
  [ ] Is this a filler sentence that adds no new information?
  If any check fails, rewrite or drop the sentence.

  Attempt number: {attempt}

  Citation registry:
  {citation_registry}

  Raw notes:
  {raw_texts}{rewrite_constraints}

# ─────────────────────────────────────────────
# REWRITE CONSTRAINTS — appended when attempt > 1
# ─────────────────────────────────────────────
rewrite_constraints_template: |

  REWRITE INSTRUCTIONS:
  The previous draft had the following specific issues that must be fixed:
  {critique_issues}

  Do not rephrase the previous draft. Return to the raw diary notes
  directly and reconstruct each flagged sentence from the source material.
  Treat the previous draft as a reference for what to avoid, not a base
  to edit from.

  Previous draft for reference only:
  {previous_draft}

# ─────────────────────────────────────────────
# SYSTEM PROMPT — Reference Extraction
# ─────────────────────────────────────────────
reference_extraction_system_prompt: |
  You are an expert at identifying and extracting citations, datasets,
  tools, and external references from research notes.

  RULES:
  - Extract ONLY what is explicitly named in the text
  - A source must have a proper name to qualify for extraction
  - Do not extract vague references: "a YouTube video", "a GitHub repo",
    "a paper", "a notebook", "some research" — these are not citable
  - Do not infer, complete, or expand partial references
  - If the same source appears multiple times, extract it once only
  - Passing mentions of named tools in any context count as extractions
    (e.g., "PyTorch threw a RuntimeError" → extract PyTorch as tool)
  - Mathematical methods, loss functions, and optimizers (e.g., Adam,
    cross-entropy, ReLU) are algorithms, not tools. Do not extract them
    as tool: type. Only extract them if they appear as named software
    packages with a version or URL.
  - Do not extract the diary or notebook itself as a source

# ─────────────────────────────────────────────
# USER PROMPT — Reference Extraction
# ─────────────────────────────────────────────
reference_extraction_user_prompt: |
  Extract all named citations, references, and sources from the following
  diary entries. A source must be explicitly named to qualify.

  WHAT TO EXTRACT:
  1. Author-year citations (e.g., "Lottem & Azouz 2011")
  2. Paper or article titles in quotes or after "titled", "on", "about"
  3. Named datasets (e.g., "Allen Brain Observatory", "CRCNS datasets")
  4. URLs with context
  5. Named code repositories with owner or specific project name
  6. Named software tools and frameworks with version if stated
     (e.g., PyTorch, TensorFlow, NumPy)
  7. AI systems mentioned by name (e.g., GPT-4, Claude)
  8. Named publications, books, or conference proceedings

  WHAT NOT TO EXTRACT:
  - "a YouTube video" — unnamed, skip
  - "a GitHub repo" — unnamed, skip
  - "a paper I skimmed" — unnamed, skip
  - "my notebook" — not a citable source, skip
  - "Adam", "cross-entropy", "ReLU" — algorithms not tools, skip
    unless appearing as a named software package with version or URL

  OUTPUT FORMAT — one line per source, exactly:
  [ENTRY_ID|TYPE|VALUE|QUOTE]

  Where:
  - ENTRY_ID: ID of the diary entry containing this reference
  - TYPE: paper | dataset | url | repository | tool | ai | publication | conference
  - VALUE: exact name as it appears in the diary
  - QUOTE: 40-100 character excerpt showing the reference in context

  Output ONLY the formatted lines. No headers, explanations, or blank lines.

  Entries to process:
  {entries_text}
